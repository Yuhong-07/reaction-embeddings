seed: 42
device: cpu
torch_threads: 8
epochs: 5
batch_size: 64
validation_fraction: 0.05
max_training_reactions: 2000
learning_rate: 0.0003
weight_decay: 0.00001
gradient_clip_norm: 5.0
temperature: 0.1
loss_weights:
  contrastive: 1.0
  variance: 1.0
  covariance: 0.04
  ec_auxiliary: 0.2
checkpoint_path: "artifacts/checkpoints/phase2_v2_pilot.pt"
checkpoint_metadata_path: "artifacts/checkpoints/phase2_v2_pilot.metadata.json"
training_history_path: "artifacts/reports/phase2_v2_training_history.jsonl"
training_scope: "pilot_subset_v2_structure_only"
loss_sign_convention: "all configured terms are non-negative penalties and are added"

