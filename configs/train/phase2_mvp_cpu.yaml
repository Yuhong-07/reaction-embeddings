seed: 42
device: cpu
torch_threads: 8
epochs: 3
batch_size: 64
validation_fraction: 0.05
max_training_reactions: 2000
learning_rate: 0.0003
weight_decay: 0.00001
gradient_clip_norm: 5.0
temperature: 0.1
loss_weights:
  contrastive: 1.0
  masked_participant: 0.5
  stoichiometry: 0.2
  direction: 0.2
checkpoint_path: "artifacts/checkpoints/phase2_mvp.pt"
checkpoint_metadata_path: "artifacts/checkpoints/phase2_mvp.metadata.json"
training_history_path: "artifacts/reports/phase2_training_history.jsonl"
training_scope: "pilot_subset"
